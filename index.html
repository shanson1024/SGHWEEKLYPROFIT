<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGH Weekly Profit Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>SGH Weekly Profit Dashboard</h1>
    </header>
    <main>
        <section class="kpi-cards">
            <div class="kpi-card">
                <h2>Total Profit</h2>
                <p id="total-profit">$0.00</p>
            </div>
            <div class="kpi-card">
                <h2>Total Revenue</h2>
                <p id="total-revenue">$0.00</p>
            </div>
            <div class="kpi-card">
                <h2>Total Expenses</h2>
                <p id="total-expenses">$0.00</p>
            </div>
        </section>
        <section class="client-tables">
            <h2>Client Profitability</h2>
            <table id="client-table">
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Profit</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Client data will be populated here -->
                </tbody>
            </table>
        </section>
        <section class="waterfall-chart">
            <h2>Profit Waterfall Chart</h2>
            <div id="waterfall-chart-container"></div>
        </section>
        <section class="margin-visualization">
            <h2>Margin Visualization</h2>
            <canvas id="margin-chart"></canvas>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 SGH. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
